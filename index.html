<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المساعد العربي الذكي</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --primary-color: #007aff;
            --text-color: #ffffff;
            --text-muted: #aaa;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .app-container {
            width: 100%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        header {
            text-align: center;
            margin-bottom: 10px;
        }

        h1 { font-size: 24px; margin: 0 0 5px 0; color: var(--text-color); }
        p { font-size: 14px; color: var(--text-muted); margin: 0; }

        .card {
            background-color: var(--card-bg);
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .status-badge {
            font-size: 14px;
            padding: 8px 12px;
            border-radius: 20px;
            text-align: center;
            background: #2a2a2a;
        }

        .btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn:disabled { background-color: #444; cursor: not-allowed; }
        .btn-secondary { background-color: #2c2c2c; border: 1px solid #444; font-size: 13px; }

        .chat-box {
            height: 250px;
            overflow-y: auto;
            border: 1px solid #333;
            border-radius: 10px;
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            background: #151515;
        }

        .msg { padding: 8px 12px; border-radius: 10px; max-width: 80%; font-size: 14px; word-wrap: break-word; }
        .msg.user { background: var(--primary-color); align-self: flex-start; }
        .msg.bot { background: #2a2a2a; align-self: flex-end; white-space: pre-line; }

        .suggestions-container {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding-bottom: 5px;
        }
        .suggestion-chip {
            background: #2a2a2a;
            color: white;
            padding: 6px 12px;
            border-radius: 15px;
            font-size: 12px;
            cursor: pointer;
            white-space: nowrap;
            border: 1px solid #444;
        }

        .controls { display: flex; gap: 10px; }
        input[type="text"] {
            flex: 1;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #333;
            background: #252525;
            color: white;
            font-size: 14px;
        }

        .progress-bar {
            width: 100%;
            background-color: #333;
            border-radius: 5px;
            overflow: hidden;
            display: none;
        }
        .progress-fill { width: 0%; height: 6px; background: var(--primary-color); transition: width 0.3s; }
        
        input[type="file"] { display: none; }
    </style>
</head>
<body>

<div class="app-container">
    <header>
        <h1 id="app-title">المساعد الشخصي الذكي 🤖</h1>
        <p id="app-subtitle">يفهمك، يتذكر عاداتك، ويعمل بصوتك</p>
    </header>

    <!-- كارت حالة النموذج المحلي -->
    <div class="card" id="setup-card">
        <div class="status-badge" id="status-text">⏳ جاري قراءة ملف الإعدادات JSON...</div>
        <div class="progress-bar" id="progress-container"><div class="progress-fill" id="progress-bar"></div></div>
        <button class="btn" id="download-btn" onclick="triggerLocalDownload()" style="display:none;">تحميل وتفعيل الذكاء الاصطناعي المحلي</button>
    </div>

    <!-- كارت المحادثة والتحكم -->
    <div class="card">
        <div class="chat-box" id="chat-box">
            <div class="msg bot" id="welcome-msg">مرحباً بك! أنا مساعدك الشخصي. كيف يمكنني تنظيم يومك اليوم؟</div>
        </div>

        <!-- اقتراحات سريعة بناءً على الـ JSON -->
        <div class="suggestions-container" id="suggestions-box"></div>

        <div class="controls">
            <input type="text" id="user-input" placeholder="اكتب رسالتك هنا..." onkeypress="handleKeyPress(event)">
            <button class="btn" onclick="handleSend()">إرسال</button>
        </div>

        <div class="controls">
            <button class="btn btn-secondary" id="mic-btn" onclick="toggleVoice()">🎙️ تحدث بالعربية</button>
            <label class="btn btn-secondary" style="cursor:pointer;">
                📁 قراءة ملف
                <input type="file" id="file-picker" onchange="handleFile(event)">
            </label>
        </div>
    </div>
</div>

<!-- استدعاء ملف الـ JS الخارجي المسؤول عن الذاكرة والذكاء المطور -->
<script src="assistant.js"></script>

<script>
    // عند فتح الصفحة، نقوم بتهيئة الواجهة بناءً على الـ JSON المستورد
    window.addEventListener('DOMContentLoaded', async () => {
        const config = await assistant.loadConfig();
        if (config) {
            document.getElementById('app-title').innerText = config.assistant_name + " 🤖";
            document.getElementById('welcome-msg').innerText = `مرحباً بك! أنا مساعدك الشخصي "${config.assistant_name}". كيف يمكنني تنظيم يومك اليوم؟`;
            document.getElementById('status-text').innerText = `⚠️ يتطلب تفعيل النموذج المحلي للعمل أوفلاين (إصدار ${config.version})`;
            document.getElementById('download-btn').style.display = 'block';

            // عرض الاقتراحات التلقائية من الـ JSON
            const sugBox = document.getElementById('suggestions-box');
            config.default_suggestions.forEach(sug => {
                const chip = document.createElement('div');
                chip.className = 'suggestion-chip';
                chip.innerText = sug;
                chip.onclick = () => {
                    document.getElementById('user-input').value = sug;
                    handleSend();
                };
                sugBox.appendChild(chip);
            });
        }
    });

    // تشغيل محاكاة تحميل الذكاء الاصطناعي
    function triggerLocalDownload() {
        const btn = document.getElementById('download-btn');
        const progressBar = document.getElementById('progress-bar');
        const progressContainer = document.getElementById('progress-container');
        const statusText = document.getElementById('status-text');

        btn.disabled = true;
        progressContainer.style.display = 'block';
        let progress = 0;

        const interval = setInterval(() => {
            progress += 10;
            progressBar.style.width = progress + '%';
            statusText.innerText = `جاري تحميل وتثبيت الملفات محلياً... ${progress}%`;

            if (progress >= 100) {
                clearInterval(interval);
                statusText.innerText = '✅ النموذج المحلي نشط وجاهز تماماً للعمل بدون إنترنت!';
                statusText.style.background = '#1c3d27';
                btn.style.display = 'none';
            }
        }, 200);
    }

    // معالجة الإرسال والربط بالمحرك الذكي المطور (تعديل الـ async/await للرد المنطقي)
    async function handleSend() {
        const input = document.getElementById('user-input');
        const text = input.value.trim();
        if (!text) return;

        appendMessage(text, 'user');
        input.value = '';

        // نرسل النص لملف الـ JS ليعالجه بالذكاء الاصطناعي التوليدي وينتظر الرد المنطقي
        const reply = await assistant.generateLogicalResponse(text);
        appendMessage(reply, 'bot');
        speak(reply);
    }

    function appendMessage(text, sender) {
        const chatBox = document.getElementById('chat-box');
        const msg = document.createElement('div');
        msg.className = `msg ${sender}`;
        msg.innerText = text;
        chatBox.appendChild(msg);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    function handleKeyPress(e) {
        if (e.key === 'Enter') handleSend();
    }

    // تشغيل نظام الصوت العربي (STT)
    const Recognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    let recognition;
    if (Recognition) {
        recognition = new Recognition();
        recognition.lang = 'ar-EG'; 
        recognition.onresult = (event) => {
            document.getElementById('user-input').value = event.results[0][0].transcript;
            handleSend();
        };
    }

    function toggleVoice() {
        if (!recognition) {
            alert("التعرف على الصوت غير مدعوم في متصفحك الحالي.");
            return;
        }
        recognition.start();
        document.getElementById('mic-btn').innerText = "⏳ جاري الاستماع...";
        recognition.onend = () => {
            document.getElementById('mic-btn').innerText = "🎙️ تحدث بالعربية";
        };
    }

    // نظام النطق بالعربي (TTS)
    function speak(text) {
        if ('speechSynthesis' in window) {
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'ar-EG';
            window.speechSynthesis.speak(utterance);
        }
    }

    // نظام قراءة الملفات محلياً المربوط بالخوارزمية الجديدة
    function handleFile(event) {
        const file = event.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(e) {
            appendMessage(`[قرأت ملف: ${file.name}]`, 'user');
            
            // استدعاء الخوارزمية المطورة لتحليل محتوى الملف حقيقياً
            setTimeout(() => {
                const fileReply = assistant.processFileContent(file.name, e.target.result);
                appendMessage(fileReply, 'bot');
            }, 500);
        };
        reader.readAsText(file);
    }
</script>

</body>
</html>
